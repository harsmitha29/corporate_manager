<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Employee</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f5f7fb; font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      width: 220px; min-height: 100vh; background: #1e2a3a;
      position: fixed; top: 0; left: 0; z-index: 100;
      padding: 1.5rem 0;
    }
    .sidebar .brand {
      color: #fff; font-weight: 700; font-size: 1.1rem;
      padding: 0 1.25rem 1.5rem; border-bottom: 1px solid #2d3f54;
      margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
    }
    .sidebar a {
      display: flex; align-items: center; gap: .6rem;
      color: #a0b0c0; text-decoration: none; padding: .55rem 1.25rem;
      font-size: .9rem; transition: background .15s, color .15s;
    }
    .sidebar a:hover, .sidebar a.active { background: #2d3f54; color: #fff; }
    .sidebar a i { font-size: 1rem; }
    .main { margin-left: 220px; min-height: 100vh; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e9ecef;
      padding: .75rem 1.75rem; display: flex;
      align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 90;
    }
    .topbar .page-title { font-weight: 600; font-size: 1.05rem; color: #1e2a3a; }
    .content { padding: 1.75rem; }
    .card { border: none; border-radius: .75rem; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .table th { font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; color: #6c757d; }
    .badge { font-weight: 500; font-size: .78em; }

  </style>
</head>
<body>

<nav class="sidebar">
  <div class="brand"><i class="bi bi-building"></i>Corp Manager</div>
  <a href="{{ url_for('admin.admin_panel') }}" class="active"><i class="bi bi-grid"></i>Dashboard</a>
  <a href="{{ url_for('attendance.admin_attendance_overview') }}"><i class="bi bi-calendar-check"></i>Attendance</a>
  <a href="{{ url_for('leaves.admin_leaves') }}"><i class="bi bi-calendar2-minus"></i>Leaves</a>
  <a href="{{ url_for('regularization.admin_regularizations') }}"><i class="bi bi-pencil-square"></i>Regularizations</a>
  <a href="{{ url_for('departments.admin_departments') }}"><i class="bi bi-diagram-3"></i>Departments</a>
  <a href="{{ url_for('holidays.admin_holidays') }}"><i class="bi bi-sun"></i>Holidays</a>
  <a href="{{ url_for('attendance.admin_team_summary') }}"><i class="bi bi-bar-chart"></i>Team Summary</a>
  <a href="{{ url_for('auth.logout') }}" style="margin-top:1rem;"><i class="bi bi-box-arrow-left"></i>Logout</a>
</nav>

<div class="main">
  <div class="topbar">
    <span class="page-title"><i class="bi bi-person-plus me-2 text-primary"></i>Add New Employee</span>
    <div class="d-flex align-items-center gap-2">
      <a href="{{ url_for('admin.admin_panel') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
      <small class="text-muted ms-3">Logged in as Admin</small>
    </div>
  </div>
  <div class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'danger' else ('success' if category == 'success' else 'warning') }} alert-dismissible fade show" role="alert">
          {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <div class="card" style="max-width:700px;">
      <div class="card-body">
        <form method="POST" action="{{ url_for('admin.create_employee') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name *</label>
              <input type="text" name="first_name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name *</label>
              <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email *</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password *</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Joining Date *</label>
              <input type="date" name="joining_date" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Department</label>
              <select name="dept_id" class="form-select">
                <option value="">— Select —</option>
                {% for d in departments %}
                <option value="{{ d.id }}">{{ d.dept_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Designation</label>
              <input type="text" name="designation" class="form-control" placeholder="e.g. Software Engineer">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Employee ID</label>
              <input type="text" name="employee_id" class="form-control" placeholder="e.g. EMP001">
            </div>
            <div class="col-12 pt-2">
              <button type="submit" class="btn btn-primary me-2"><i class="bi bi-person-plus"></i> Create Employee</button>
              <a href="{{ url_for('admin.admin_panel') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

</body>
</html>
